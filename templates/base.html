<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart LMS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<!-- 
    Theme must be applied BEFORE page renders to prevent flash.
    This runs synchronously in <head> — before any HTML is painted.
    localStorage check happens instantly, no waiting for JS file to load.
-->
<script>
    (function() {
        if (localStorage.getItem('lms-theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    })();
</script>
</head>
<body>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
